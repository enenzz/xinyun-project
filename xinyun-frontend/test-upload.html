<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传测试</title>
    <style>
        img { max-width: 300px; margin-top: 10px; }
        #url { margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <h2>图片上传测试</h2>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="upload()">上传</button>
    <div id="result"></div>
    <div id="url"></div>
    <img id="preview" src="" alt="">

    <script>
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                alert('请选择图片');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:8080/common/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                // 后端返回的是 Result 对象，包含 code, message, data
                if (result.code === 200 && result.data) {
                    const url = result.data;
                    document.getElementById('url').innerHTML = '<strong>图片 URL:</strong> ' + url;
                    document.getElementById('preview').src = url;
                    document.getElementById('result').innerHTML = '上传成功！';
                } else {
                    throw new Error(result.message || '上传失败');
                }
            } catch (error) {
                console.error('Upload error:', error);
                document.getElementById('result').innerHTML = '上传失败：' + error.message;
            }
        }
    </script>
</body>
</html>
